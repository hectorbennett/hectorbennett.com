{% load staticfiles %}

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- css -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">

    <!-- js -->
    <script src="{% static 'scripts/jquery.min.js' %}"></script>
    <script src="{% static 'scripts/main.js' %}"></script>

    <!-- fonts -->
    <link href="https://fonts.googleapis.com/css?family=Bree+Serif" rel="stylesheet">

    <title>{% block title %}Hector Bennett{% endblock %}</title>

</head>

<body>
    
    
    <nav id="logo" class="nav navbar-rotated-left">
        <span class="inner-nav">
            <a class="nav-link active" href="/">Hector Bennett</a>
        </span>
    </nav>

    <nav id="menu-btns" class="nav navbar-rotated-right">
        <span class="nav inner-nav">
            <a id="info-btn" class="nav-link active" href="/">Info</a>
            <a id="work-btn" class="nav-link active" href="/work">Button 2</a>
            <a id="shows-btn" class="nav-link active" href="/shows">Button 3</a>
            <a id="contact-btn" class="nav-link active" href="/contact">Button 4</a>
        </span>
    </nav>
    

    <div id="bg-top-half"></div>
        
    <!-- <div>

   
        {% block content %}{% endblock %}
    </div> -->

</body>
