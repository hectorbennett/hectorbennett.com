{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- REQUIRED META TAGS -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block css %} {% endblock %}

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css?family=Bree+Serif" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Archivo+Black|Hammersmith+One" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Kanit:600" rel="stylesheet"> 
    <link href="https://fonts.googleapis.com/css?family=Kanit:600|Montserrat:900" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Kanit:600|Montserrat:900|Raleway" rel="stylesheet"> 

    <title>Hector // {% block title %}{% endblock %}</title>
</head>

<body class="light-orange">
    
    <!-- NAVBAR -->
    <nav class="navbar white shadow navbar-expand-lg navbar-light bg-light mb-5">
        <a class="navbar-brand title" href="/">Hector Bennett</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarText" aria-controls="navbarText"
            aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/secret-santa">Secret Santa</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- FOOTER -->
    <footer class="footer white shadow my-3">
        <div class="container navbar-expand">
            <ul class="navbar-nav justify-content-end">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="fa fa-github"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="fa fa-linkedin"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="fa fa-envelope"></i></a>
                </li>
            </ul>
        </div>
    </footer>
</body>

<!-- SCRIPTS -->
<script src="{% static 'scripts/jquery.min.js' %}"></script>
<script src="{% static 'scripts/popper.min.js' %}"></script>
<script src="{% static 'scripts/bootstrap.min.js' %}"></script>
<script src="{% static 'scripts/main.js' %}"></script>
{% block scripts %}
{% endblock %}
