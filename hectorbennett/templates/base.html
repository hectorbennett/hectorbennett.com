{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- css -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}"> {% block css %} {% endblock %}

    <!-- fonts -->
    <link href="https://fonts.googleapis.com/css?family=Bree+Serif" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Archivo+Black|Hammersmith+One" rel="stylesheet"> 

    <title>{% block title %}Hector Bennett{% endblock %}</title>

</head>

<body class="light-orange">

    <nav class="navbar orange shadow navbar-expand-lg navbar-dark mb-5">
        <a class="navbar-brand" href="/">Hector Bennett</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup"
            aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
              </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav justify-content-end">
                <a class="nav-item nav-link" href="/contact">Contact</a>
                <a class="nav-item nav-link" href="/secret-santa">Secret santa</a>
            </div>
        </div>
    </nav>


    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>


<!-- js -->
<script src="{% static 'scripts/jquery.min.js' %}"></script>
<script src="{% static 'scripts/popper.min.js' %}"></script>
<script src="{% static 'scripts/bootstrap.min.js' %}"></script>
<script src="{% static 'scripts/main.js' %}"></script>
{% block scripts %} {% endblock %}
